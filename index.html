<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>website</title>

<style>
body{
    margin:0;
    background:black;
    font-family:sans-serif;
    height:100vh;
    overflow-x:hidden;
}

#wave-bg{
    position:fixed;
    inset:0;
    z-index:0;
}
#wave-bg svg{
    width:100%;
    height:100%;
}
.wave-surface{
    fill:#0a0a0a;
    filter:url(#waveFilter);
}

#edit-text{
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:14px;
    opacity:0.8;
    z-index:4;
    text-align:center;
}

#textbox-area{
    position:fixed;
    top:30px;
    left:50%;
    transform:translateX(-50%);
    width:420px;
    padding:20px;
    border-radius:16px;

    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.25);

    box-shadow:0 8px 40px rgba(0,0,0,0.7);
    z-index:3;

    color:white;
    text-align:center;
    font-size:22px;
    cursor:pointer;
}

#textbox-area, #edit-text {
    user-select: none;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
}

#play-button {
    position:fixed;
    top:20px;
    left:20px;
    padding:10px 16px;
    font-size:16px;
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:10px;
    backdrop-filter:blur(10px);
    color:white;
    cursor:pointer;
    z-index:4;
}

#letter-l {
    display:inline-block;
    width: 0.6ch;
    transition: width 3s ease, opacity 3s ease;
    overflow: hidden;
    vertical-align: bottom;
    opacity: 1;
}

#letter-l.hide {
    width: 0;
    opacity: 0;
}

#image-stage{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:2;
    pointer-events:none;
}

#scroll-image{
    max-width:70vw;
    pointer-events:auto;
}
</style>
</head>
<body>

<div id="wave-bg">
<svg viewBox="0 0 1000 600" preserveAspectRatio="none">
<defs>
<filter id="waveFilter">
<feTurbulence type="turbulence" baseFrequency="0.008 0.02" numOctaves="3" seed="2" result="noise">
<animate attributeName="baseFrequency" values="0.008 0.02;0.01 0.025;0.008 0.02" dur="20s" repeatCount="indefinite"/>
</feTurbulence>
<feDisplacementMap in="SourceGraphic" in2="noise" scale="120" xChannelSelector="R" yChannelSelector="G"/>
</filter>
</defs>
<rect width="100%" height="100%" class="wave-surface"/>
</svg>
</div>

<div id="edit-text">double click to edit</div>

<div id="textbox-area">meow</div>

<button id="play-button">P<span id="letter-l">l</span>ay Sound</button>

<div id="image-stage">
    <img id="scroll-image" src="test5.png">
</div>

<script>
const img = document.getElementById("scroll-image")
const panel = document.getElementById("textbox-area")
const playButton = document.getElementById("play-button")
const audio = new Audio("test6.mp3")
const letterL = document.getElementById("letter-l")

let start, end, maxScroll

function calculate(){
    const imageHeight = img.offsetHeight
    const panelRect = panel.getBoundingClientRect()
    start = window.innerHeight
    end = panelRect.bottom + 20 - (window.innerHeight/2 - imageHeight/2)
    maxScroll = start - end
    document.body.style.height = (window.innerHeight + maxScroll) + "px"
    update()
}

function update(){
    const progress = Math.min(window.scrollY / maxScroll,1)
    const y = start + (end - start) * progress
    img.style.transform = `translateY(${y}px)`
}

window.addEventListener("scroll",update)
window.addEventListener("resize",calculate)

img.onload = () => {
    calculate()
    window.scrollTo(0,0)
}

playButton.addEventListener("click", ()=>{
    audio.currentTime = 0
    audio.play()

    letterL.classList.add("hide")
})

panel.addEventListener("dblclick", () => {
    const video = document.createElement("video");
    video.src = "test7.mp4";
    video.style.position = "fixed";
    video.style.top = "50%";
    video.style.left = "50%";
    video.style.transform = "translate(-50%, -50%)";
    video.style.zIndex = "5";
    video.style.maxWidth = "90vw";
    video.style.maxHeight = "90vh";
    video.autoplay = true;
    video.controls = false;
    video.loop = false;
    video.muted = false;
    video.style.pointerEvents = "none";
    document.body.appendChild(video);

    video.onended = () => {
        document.body.removeChild(video);
    }
});
</script>

</body>
</html>
