<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>skolus</title>
  <style>
    body {
      margin: 0;
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 10;
      padding: 5rem 2rem;
      text-align: center;
      font-size: 1.4rem;
      text-shadow:
        0 0 4px #000,
        0 0 8px #000,
        0 0 16px #000,
        0 0 32px rgba(0, 212, 255, 0.4),
        0 0 64px rgba(0, 212, 255, 0.25),
        0 6px 20px rgba(0,0,0,1);
      letter-spacing: 0.5px;
    }

    a {
      color: #00eaff;
      text-decoration: none;
      transition: all 0.2s;
    }

    a:hover {
      color: #4dffff;
      text-shadow:
        0 0 20px rgba(0, 212, 255, 0.9),
        0 0 40px rgba(0, 212, 255, 0.6);
    }

    @media (max-width: 600px) {
      .content {
        padding: 7rem 1.5rem;
        font-size: 1.25rem;
      }
    }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="content">
  im skolus<br><br>
  <a href="https://discord.com/users/1040112253527142462" target="_blank" rel="noopener noreferrer">@skolus on dc</a> | 1040112253527142462
</div>

<script>
const c = document.getElementById('bg');
const ctx = c.getContext('2d');

let w, h;

function resize() {
  w = c.width = window.innerWidth;
  h = c.height = window.innerHeight;
}

window.addEventListener('resize', resize);
resize();

const count = Math.min(20, Math.floor(w * h / 12000));
const polys = [];

class Poly {
  constructor() {
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.size = 35 + Math.random() * 110;
    this.points = 3 + Math.floor(Math.random() * 5);
    this.hue = 160 + Math.random() * 100;
    this.speed = 0.6 + Math.random() * 1.4;
    this.angle = Math.random() * Math.PI * 2;
    this.rot = (Math.random() - 0.5) * 0.04;
    this.pickNewTarget();
  }

  pickNewTarget() {
    const angle = Math.random() * Math.PI * 2;
    const dist = 300 + Math.random() * 800;
    this.tx = this.x + Math.cos(angle) * dist;
    this.ty = this.y + Math.sin(angle) * dist;
    this.targetTimer = 400 + Math.random() * 900;
  }

  update() {
    if (--this.targetTimer <= 0) this.pickNewTarget();

    const dx = this.tx - this.x;
    const dy = this.ty - this.y;
    const dist = Math.hypot(dx, dy);
    if (dist !== 0) {
      const move = Math.min(this.speed, dist * 0.008);
      this.x += (dx / dist) * move;
      this.y += (dy / dist) * move;
    }

    this.angle += this.rot;

    if (this.x < -this.size * 2) this.x += w + this.size * 4;
    if (this.x > w + this.size * 2) this.x -= w + this.size * 4;
    if (this.y < -this.size * 2) this.y += h + this.size * 4;
    if (this.y > h + this.size * 2) this.y -= h + this.size * 4;
  }

  draw(t) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);

    ctx.beginPath();
    for (let i = 0; i < this.points; i++) {
      const a = i / this.points * Math.PI * 2;
      const r = this.size * (0.6 + Math.sin(a * 5 + t) * 0.35);
      ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    }
    ctx.closePath();

    ctx.fillStyle = `hsla(${this.hue}, 78%, 50%, 0.085)`;
    ctx.fill();
    ctx.strokeStyle = `hsla(${this.hue}, 90%, 68%, 0.16)`;
    ctx.lineWidth = 1.3;
    ctx.stroke();

    ctx.restore();
  }
}

for (let i = 0; i < count; i++) polys.push(new Poly());

function loop() {
  ctx.fillStyle = 'rgba(13,13,13,0.32)';
  ctx.fillRect(0, 0, w, h);

  const t = Date.now() * 0.0007;

  for (const p of polys) {
    p.update();
    p.draw(t);
  }

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
